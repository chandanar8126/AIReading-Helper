{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 4rem auto; text-align: center; padding: 2rem;">
  <div style="font-size: 6rem; color: var(--primary);">404</div>
  <h1 style="color: var(--dark); margin-bottom: 1rem;">Page Not Found</h1>
  <p style="color: var(--gray-600); font-size: 1.2rem; margin-bottom: 2rem;">
    Sorry, the page you are looking for does not exist.
  </p>
  <a href="{{ url_for('home') }}" class="btn-primary" style="display: inline-block; padding: 1rem 2.5rem;">
    ← Go Back Home
  </a>
</div>
{% endblock %}
