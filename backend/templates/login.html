{% extends "base.html" %}
{% block content %}
<section class="content" style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 300px);">
  <div class="card" style="max-width: 450px; width: 100%;">
    <!-- Header -->
    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
      <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
      <p style="color: var(--gray-600);">Sign in to continue your reading journey</p>
    </div>

    <!-- Login Form -->
    <form method="POST" action="{{ url_for('login') }}" style="display: grid; gap: 1.5rem;">
      <!-- Email Field -->
      <div>
        <label for="email" class="field">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="your@email.com" 
          required
          style="width: 100%;"
        >
      </div>

      <!-- Password Field -->
      <div>
        <label for="password" class="field">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password" 
          required
          style="width: 100%;"
        >
      </div>

      <!-- Remember Me & Forgot Password -->
      <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;">
        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin: 0;">
          <input type="checkbox" name="remember" style="width: auto; margin: 0;">
          <span style="color: var(--gray-600);">Remember me</span>
        </label>
        <a href="#" style="color: var(--primary); text-decoration: none;">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-primary" style="width: 100%; margin-top: 0.5rem;">
        Sign In
      </button>
    </form>

    <!-- Divider -->
    <div style="display: flex; align-items: center; margin: 2rem 0; gap: 1rem;">
      <div style="flex: 1; height: 1px; background: var(--gray-200);"></div>
      <span style="color: var(--gray-500); font-size: 0.9rem;">OR</span>
      <div style="flex: 1; height: 1px; background: var(--gray-200);"></div>
    </div>

    <!-- Social Login Options -->
    <div style="display: grid; gap: 1rem;">
      <button type="button" style="width: 100%; padding: 0.9rem; border: 2px solid var(--gray-200); background: white; border-radius: 12px; font-weight: 600; color: var(--gray-700); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: var(--transition);">
        <span style="font-size: 1.2rem;">🔍</span>
        Continue with Google
      </button>
      <button type="button" style="width: 100%; padding: 0.9rem; border: 2px solid var(--gray-200); background: white; border-radius: 12px; font-weight: 600; color: var(--gray-700); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: var(--transition);">
        <span style="font-size: 1.2rem;">📘</span>
        Continue with Facebook
      </button>
    </div>

    <!-- Sign Up Link -->
    <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--gray-200);">
      <p style="color: var(--gray-600);">
        Don't have an account? 
        <a href="{{ url_for('signup') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign up</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
